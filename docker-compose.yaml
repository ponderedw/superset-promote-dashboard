services:

  # ── Single PostgreSQL container: superset + db_source + db_target ──────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
      POSTGRES_DB: superset
    ports:
      - "5499:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset -d superset"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks:
      - superset-net

  # ── Superset ────────────────────────────────────────────────────────────────
  superset:
    build:
      context: .
      dockerfile: superset/Dockerfile
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "thisISaSECRET_1234"
      SUPERSET_DB_URI: "postgresql+psycopg2://superset:superset@postgres:5432/superset"
      PYTHONPATH: "/app/pythonpath"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py
    networks:
      - superset-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8088/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  # ── Init container: DB upgrade + admin user + sample data ─────────────────
  superset-init:
    build:
      context: .
      dockerfile: superset/Dockerfile
    command:
      - bash
      - -c
      - |
        superset db upgrade &&
        superset fab create-admin --username admin --firstname Admin --lastname User --email admin@example.com --password admin || true &&
        superset init &&
        python /app/pythonpath/import_connections.py
    environment:
      SUPERSET_SECRET_KEY: "thisISaSECRET_1234"
      SUPERSET_DB_URI: "postgresql+psycopg2://superset:superset@postgres:5432/superset"
      PYTHONPATH: "/app/pythonpath"
      SUPERSET_URL: "http://superset:8088"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "admin"
      SOURCE_DB_URI: "postgresql+psycopg2://superset:superset@postgres:5432/db_source"
      TARGET_DB_URI: "postgresql+psycopg2://superset:superset@postgres:5432/db_target"
    depends_on:
      postgres:
        condition: service_healthy
      superset:
        condition: service_healthy
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py
      - ./superset/import_connections.py:/app/pythonpath/import_connections.py
    networks:
      - superset-net
    restart: "no"

volumes:
  postgres-data:

networks:
  superset-net:
    driver: bridge
